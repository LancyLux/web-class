<!doctype html>
<html>
  <head>
    <title>皮卡丘训练师卡</title>
    <style>
      /* 被破坏的初始样式 */
      .card {
        width: 600px;
        border: black;
      }

      .badge {
        background: yellow;
      }

      img {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="header">
        <h2>⚡ 雷电训练师</h2>
        <span class="badge">初级徽章</span>
      </div>

      <img src="./../images/pikachu.jpg" alt="皮卡丘" />

      <div class="stats">
        <p>等级：Lv.15</p>
        <p>技能：电光一闪</p>
      </div>
    </div>
  </body>
</html>
<style>
  .card {
    width: 320px;
    min-height: 480px; /* 最小高度保障 */
    border: 5px solid #ffd700;
    border-radius: 20px;
    background: linear-gradient(#fff 60%, #ffe0b2);
    box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.2);
    padding: 20px;
    box-sizing: border-box;
    /* 整个卡片在页面居中对齐 */
    margin: 30px auto;
  }

  .header {
    margin-bottom: 15px; /* 下外边距 */
    font-size: 0; /* 消除inline-block间隙 */
  }

  h2,
  .badge {
    display: inline-block; /* 行内块布局 */
  }

  h2 {
    width: 70%; /* 宽度控制 */
    margin: 0;
    font-size: 24px; /* 恢复字体大小 */
    color: #2c3e50;
  }

  .badge {
    width: 28%; /* 宽度控制 */
    padding: 8px; /* 内边距 */
    background: #ffeb3b;
    border: 2px solid #f1c40f;
    border-radius: 12px;
    text-align: center;
    font-size: 14px; /* 恢复字体大小 */
  }

  img {
    width: 100%;
    /* 固定图片高度 */
    height: 250px;
    /* 保持图片宽高比比例 */
    object-fit: cover;
    border: 3px solid #e0e0e0;
    border-radius: 10px;
    margin-bottom: 15px;
  }

  .stats {
    /* 内容区最大高度 */
    max-height: 122px;
    /* 垂直滚动条，避免内容区溢出 */
    overflow-y: auto;
  }

  .stats p {
    padding: 10px;
    margin: 8px 0;
    background: #f5f5f5;
    border-radius: 6px;
  }
</style>
