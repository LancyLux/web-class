<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>游戏启动器（完整版）</title>
    <style>
      .launcher {
        width: 800px;
        height: 500px;
        background-color: black;
        color: #00ffff;
      }
      h1 {
        text-align: center;
      }
      .notice {
        text-indent: 2em;
        font-style: italic;
      }

      .offline {
        text-decoration: line-through;
        color: gray;
      }
      .start-btn:link,
      .start-btn:visited {
        color: white;
        text-decoration: none;
      }

      .start-btn:hover {
        background-color: white;
        color: black;
      }
    </style>
  </head>
  <body>
    <div class="launcher">
      <h1>《赛博前线 2077》启动端</h1>
      <p class="notice">
        系统公告：S4 赛季“重返夜之城”已正式上线，请玩家选择服务器进入游戏，祝您武运昌隆！
      </p>

      <h3>服务器列表：</h3>
      <p>网通一区（空闲）</p>
      <p>电信二区（拥挤）</p>
      <p class="offline">测试专区（停机维护中）</p>

      <br />
      <a href="#" class="start-btn">>> 立即启动游戏 <<</a>
    </div>
  </body>
</html>
