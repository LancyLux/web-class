<style>
  body {
    background: url(../../images/0.png) no-repeat top center/cover;
  }
</style>
<script>
  //取到N~M 的随机整数
  function getRandom(N, M) {
    return Math.floor(Math.random() * (M - N + 1)) + N;
  }
  // var random
  // let random
  const random = getRandom(0, 2);
  document.body.style.backgroundImage = `url(../images/${random}.png)`;
</script>
