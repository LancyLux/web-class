  <script>
    // 使用类创建对象
    class Student1 {
      sing() {
        console.log('singing');
      }
    }
    var stu1 = new Student1();
    var stu2 = new Student1();
    console.log(stu1.sing === stu2.sing);       // 输出结果为：true
