<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    // 替换原型对象实现继承
    function Student() {}
    Student.prototype = {
      sayHello: function () {
        console.log('新的对象');
      }
    };
    var student = new Student();
    student.sayHello();   // 输出结果为：新的对象
  </script>    
</body>
</html>
