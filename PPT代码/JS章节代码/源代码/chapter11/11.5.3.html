<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    try {
      var e1 = new Error('错误信息');
      throw e1;
    } catch (e) {
      console.log(e.message); // 输出结果：错误信息
      console.log(e1 === e);  // 输出结果：true
    }
  </script>
</body>
</html>
