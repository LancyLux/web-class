<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    // 定义类
    class Student {
      constructor(name) {     // 构造方法
        this.name = name;     // 为新创建的对象添加name属性
      }
    }
    // 使用类创建对象
    var stu1 = new Student('小明');
    var stu2 = new Student('小智');
    console.log(stu1);  // 输出结果为：Student {name: '小明'}
    console.log(stu2);  // 输出结果为：Student {name: '小智'}
  </script>
</body>
</html>
