<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <script src="jquery-3.6.4.min.js"></script>
</head>
<body>
  <script>
    var obj = 123456;
    console.log(obj.toString());      // 输出结果为：123456
    obj = [1, 2, 3, 4, 5, 6]
    console.log(obj.toString());      // 输出结果为：1,2,3,4,5,6
    obj = function () {};
    console.log(obj.toString());      // 输出结果为：function () {}
  </script>
</body>
</html>
