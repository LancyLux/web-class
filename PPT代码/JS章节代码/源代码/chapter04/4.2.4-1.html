<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Document</title>
  </head>
  <body>
    <script>
      function factorial(n) {		// 定义回调函数
        if (n == 1) {
          return 1;     	   		// 递归出口
        }
        return n * factorial(n - 1);
      }
      var n = prompt('请输入大于或等于1的正整数');
      // 处理用户传递的数据，符合要求则调用factorial()函数，否则在控制台给出提示信息
      n = parseInt(n);
      if (isNaN(n)) {
        console.log('输入的n值不合法');
      } else {
        console.log(`${n}的阶乘为：`+ factorial(n));
      }
    </script>
  </body>
</html>
