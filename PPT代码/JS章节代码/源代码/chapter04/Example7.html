<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Document</title>
  </head>
  <body>
    <script>
      function isLeapYear(year) {
        // 将例6中的isLeapYear()函数中的代码复制到此处
        var flag = false;
        if (year % 4 == 0 && year % 100 != 0 || year % 400 == 0) {
          flag = true;
        }
        return flag;
      }
      function fn() {
        var year = prompt('请输入年份：');
        if (isLeapYear(year)) {
          alert(`${year}年是闰年，2月份有29天`);
        } else {
          alert(`${year}年是平年，2月份有28天`);
        }
      }
      fn();
    </script>
  </body>
</html>
