<body>
  <script>
    // 定义求两个数乘积的函数表达式
    var fn = function product(num01, num02) {
      return num01 * num02;
    };
    // 调用函数并将结果输出到控制台
    console.log(fn(3, 5));          // 输出结果为：15
  </script>
