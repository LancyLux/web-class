<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Document</title>
  </head>
  <body>
    <script>
      function isLeapYear(year) {
        var flag = false;
        if (year % 4 == 0 && year % 100 != 0 || year % 400 == 0) {
          flag = true;
        }
        return flag;
      }
      console.log(isLeapYear(2024) ? '2024年是闰年' : '2024年不是闰年');
      console.log(isLeapYear(2025) ? '2025年是闰年' : '2025年不是闰年');
    </script>
  </body>
</html>
