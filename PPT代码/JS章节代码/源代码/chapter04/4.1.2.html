<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Document</title>
  </head>
  <body>
    <script>
      // 定义函数
      function sayHello() {
        console.log('hello');
      }
      // 调用函数
      sayHello();						    // 输出结果为：hello
      
      var sum = 0;
      for (var i = 1; i <= 100; i++) {
        sum += i;
      }
      console.log(sum);				  // 输出结果为：5050

      var sum = 0;
      for (var i = 50; i <= 100; i++) {
        sum += i;
      }
      console.log(sum);				 // 输出结果为：3825

      // 定义一个getSum函数，将代码写在大括号“{}”中
      function getSum(num1, num2) {
        var sum = 0;
        for (var i = num1; i <= num2; i++) {
          sum += i;
        }
        console.log(sum);	                            // 函数执行结束后，将结果输出到控制台
      }
      // 调用getSum函数，在调用时需要写上小括号，并在小括号里传入参数
      getSum(1, 100);	 	                              // 输出结果为：5050
      getSum(50,100);	 	                              // 输出结果为：3825
    </script>
  </body>
</html>
