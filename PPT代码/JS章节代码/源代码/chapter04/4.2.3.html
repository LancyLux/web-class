<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Document</title>
  </head>
  <body>
    <script>
    function cooking(flavour) {
      var food = '香辣土豆丝';
      food = flavour(food);
      return food;
    }
    var food = cooking(function (food) {
      return food += '微辣';
    });
    console.log(food);
    </script>
  </body>
</html>
