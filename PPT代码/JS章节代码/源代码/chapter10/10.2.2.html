<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <style>
    .container {
      width: 80px;
      height: 80px;
      background-color: pink;
      overflow: scroll;
    }
    .son {
      width: 200px;
      height: 200px;
    }
  </style>
  <script src="jquery-3.6.4.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="son"></div>
  </div>
  <button>获取</button>
  <script>
    $('button').click(function () {
      // 获取元素相对滚动条左部的位置
      console.log($('.container').scrollLeft());
      // 获取元素相对滚动条顶部的位置
      console.log($('.container').scrollTop());
    });
    // 设置元素相对滚动条左部的位置
    $('.container').scrollLeft(80);
    // 设置元素相对滚动条顶部的位置
    $('.container').scrollTop(100);
  </script>
</body>
</html>
