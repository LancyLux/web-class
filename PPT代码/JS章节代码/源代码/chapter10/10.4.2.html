<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    li {
      list-style-type: none;
    }

    a {
      text-decoration: none;
      font-size: 14px;
    }

    .nav {
      margin: 100px;
      background-color: #ADDBF7;
      padding-left: 100px;
    }

    .nav::after {
      content: '';
      display: block;
      clear: both;
    }

    .nav>li {
      position: relative;
      float: left;
      width: 80px;
      height: 41px;
      text-align: center;
    }

    .nav li a {
      display: block;
      width: 100%;
      height: 100%;
      line-height: 41px;
      color: #333;
    }

    .nav>li:hover>a {
      background-color: #2597DF;
    }

    .nav ul {
      display: none;
      position: absolute;
      top: 41px;
      left: 0;
      width: 100%;
      border-left: 1px solid #369FE2;
      border-right: 1px solid #369FE2;
    }

    .nav ul li:last-child {
      border-bottom: 1px solid #369FE2;
    }

    .nav ul li a:hover {
      background-color: #ADDBF7;
    }
  </style>
  <script src="jquery-3.6.4.min.js"></script>
</head>
<body>
  <ul class="nav">
    <li>
      <a href="#">家用电器</a>
      <ul>
        <li>
          <a href="">电视</a>
        </li>
        <li>
          <a href="">空调</a>
        </li>
        <li>
          <a href="">冰箱</a>
        </li>
      </ul>
    </li>
    <li>
      <a href="#">童装童鞋</a>
      <ul>
        <li>
          <a href="">运动鞋</a>
        </li>
        <li>
          <a href="">卫衣</a>
        </li>
        <li>
          <a href="">裤子</a>
        </li>
      </ul>
    </li>
    <li>
      <a href="#">冷饮冻食</a>
      <ul>
        <li>
          <a href="">冰淇淋</a>
        </li>
        <li>
          <a href="">冷藏饮料</a>
        </li>
        <li>
          <a href="">汤圆</a>
        </li>
      </ul>
    </li>
    <li>
      <a href="#">体育用品</a>
      <ul>
        <li>
          <a href="">篮球</a>
        </li>
        <li>
          <a href="">排球</a>
        </li>
        <li>
          <a href="">网球</a>
        </li>
      </ul>
    </li>
  </ul>
  <script>
    // $('.nav > li').mouseover(function() {
    //   $(this).children('ul').slideDown(200);
    // });
    // $('.nav > li').mouseout(function() {
    //   $(this).children('ul').slideUp(200);
    // });

    // $('.nav > li').hover(function () {
    //   $(this).children('ul').slideToggle(200);
    // });


    // 利用10.4.3节停止动画优化案例效果

    // $('.nav > li').mouseover(function() {
    //   $(this).children('ul').stop().slideDown(200);
    // });
    // $('.nav > li').mouseout(function() {
    //   $(this).children('ul').stop().slideUp(200);
    // });

    $('.nav > li').hover(function () {
      $(this).children('ul').stop().slideToggle(200);
    });
  </script>
</body>
</html>
