<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>节点操作</title>
  </head>
  <body>
    <ul>
      <li>文本1</li>
      <li>文本2</li>
      <li>文本3</li>
    </ul>
    <script>
      // 获取文档节点的第一个子节点，即文档类型节点
      var doctype = document.firstChild;
      console.log(doctype);
      // 获取文档节点的第一个子元素节点，即html元素
      var html = document.firstElementChild;
      console.log(html);
      // 获取html元素的最后一个子元素节点，即body元素
      var body = html.lastElementChild; 
      console.log(body);
      // 获取body元素的第一个子元素节点，即ul元素
      var ul = body.firstElementChild;
      console.log(ul);
      // 获取ul元素中的所有子元素节点集合，即所有li元素
      var lis = ul.children;
      console.log(lis);
    </script>
  </body>   
</html>
