<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Document</title>
  </head>
  <body>
    <div>
      <h1>
        <span class="child">获取父节点</span>
      </h1>
    </div>
    <script>
      var child = document.querySelector('.child');
      console.log(child.parentNode);    // 获取span元素的父节点，即h1元素
    </script>
  </body>  
</html>
