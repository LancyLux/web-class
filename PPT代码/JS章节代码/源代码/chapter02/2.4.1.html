<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    // if语句
    var age = 23;               // 声明变量age并赋值为23
    if (age >= 18) {
      console.log('已成年');    // 在控制台输出“已成年”
    }
    // if...else语句
    var age = 17;               // 声明变量age并赋值为17
    if (age >= 18) {
      console.log('已成年');     // 当age >= 18时在控制台输出“已成年”
    } else {
      console.log('未成年');     // 当age < 18时在控制台输出“未成年”
    }

    // if...else if...else语句
    var score = 78;						    // 声明变量score并赋值为83
    if (score >= 90) {
      console.log('优秀');				// 当score >= 90时在控制台输出“优秀”
    } else if (score >= 80) {
      console.log('良好');				// 当score >= 80时在控制台输出“良好”
    } else if (score >= 70) {
      console.log('中等');				// 当score >= 70时在控制台输出“中等”
    } else if (score >= 60) {
      console.log('及格');				// 当score >= 60时在控制台输出“及格”
    } else {
      console.log('不及格');			// 当score < 60时在控制台输出“不及格”
    }

    // switch语句
    var week = 3;
    switch (week) {
      case 0:
        console.log('星期日');
        break;
      case 1:
        console.log('星期一');
        break;
      case 2:
        console.log('星期二');
        break;
      case 3:
        console.log('星期三');
        break;
      case 4:
        console.log('星期四');
        break;
      case 5:
        console.log('星期五');
        break;
      case 6:
        console.log('星期六');
        break;
      default:
        console.log('输入错误，请重新输入');
    };
  </script>
</body>
</html>
