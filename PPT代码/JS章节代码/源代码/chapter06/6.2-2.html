<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Document</title>
  </head>
  <body>
    <script>
      var node = document.body;		    // 获取body节点
      console.log(node.nodeName);		  // 获取节点名称，输出结果为：BODY
      console.log(node.nodeValue);	  // 获取节点值，输出结果为：null
      console.log(node.nodeType);		  // 获取节点类型，输出结果为：1
    </script>
  </body>
</html>
