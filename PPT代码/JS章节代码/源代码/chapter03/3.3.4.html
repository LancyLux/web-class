<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var employee = ['小明', '小智'];
      employee[2] = '小娜';
      employee[4] = '小王';
      employee[0] = '小丽';
      employee.push('hello');
      console.log(employee);
      // 输出结果为： (5) ['小丽', '小智', '小娜', empty, '小王']

      var arr = [];
      for (var i = 0; i < 5; i++) {
        arr[i] = i + 1;
      }
      console.log(arr); // 输出结果为：(5) [1, 2, 3, 4, 5]
    </script>
  </body>
</html>
