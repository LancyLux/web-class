<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    var str = 'Hello World123';
    var reg1 = /\d/g;
    var reg2 = /\W/g;
    console.log(str.match(reg1));     // 输出结果为：(3) ['1', '2', '3']
    console.log(str.match(reg2));     // 输出结果为：[' ']
  </script>
</body>
</html>
