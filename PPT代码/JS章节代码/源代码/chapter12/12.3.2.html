<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    var str = 'beautiful 风景!';
    console.log(str.match(/[abc]/g));   // 输出结果为：(2) ['b', 'a']
    console.log(str.match(/[^a-z]/g));  // 输出结果为：(4) [' ', '风', '景', '!']
  </script>
</body>
</html>
