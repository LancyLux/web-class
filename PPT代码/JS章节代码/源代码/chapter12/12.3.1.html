<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    var reg1 = /^a/;
    var reg2 = /e$/;
    console.log(reg1.test('apricot'));              // 输出结果为：true
    console.log(reg2.test('orange'));               // 输出结果为：true
    console.log(/^Happy day$/.test('Happy day'));   // 输出结果为：true
    console.log(/^Sad day$/.test('Happy day'));     // 输出结果为：false
  </script>
</body>
</html>
