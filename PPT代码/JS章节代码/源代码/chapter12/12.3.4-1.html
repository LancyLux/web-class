<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    console.log('hit'.match(/h.t/g));         // 输出结果为：['hit']
    console.log('hiit'.match(/hi?t/g));       // 输出结果为：null
    console.log('hiit'.match(/hi+t/g));       // 输出结果为：['hiit']
    console.log('ht'.match(/hi*t/g));         // 输出结果为：['ht']
    console.log('hit'.match(/hi{1}t/g));      // 输出结果为：['hit']
    console.log('hiit'.match(/hi{1,}t/g));    // 输出结果为：['hiit']
    console.log('hiiit'.match(/hi{1,3}t/g));  // 输出结果为：['hiiit']
  </script>
</body>
</html>
