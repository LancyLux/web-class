<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    var str = 'webWEB';
    var reg1 = /w.*b/ig;          // 贪婪匹配
    console.log(str.match(reg1)); // 输出结果为：['webWEB']
    var reg2 = /w.*?b/ig;         // 懒惰匹配
    console.log(str.match(reg2)); // 输出结果为：(2) ['web', 'WEB']
  </script>
</body>
</html>
