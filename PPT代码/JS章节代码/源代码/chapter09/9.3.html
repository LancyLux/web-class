<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <script src="jquery-3.6.4.min.js"></script>
</head>
<body>
  <div>
    <span>div标签下的span标签</span>
  </div>
  <input type="text" value="请输入内容">
  <script>
    // 获取元素的内容
    console.log($('div').html());   // 输出结果为：<span>div标签下的span标签</span>
    console.log($('div').text());   // 输出结果为：div标签下的span标签
    console.log($('input').val());  // 输出结果为：请输入内容
    $('div').html('<span>内容</span> div标签的内容');
    $('span').text('span标签的内容');
    $('input').val('123456');
  </script>  
</body>
</html>
