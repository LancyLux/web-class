<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
  </head>
  <body>
    <script>
      console.log(1);
      setTimeout(function () {
        console.log(2);
      }, 0);

      setTimeout(() => {
        console.log(123);
      }, 2000);

      setInterval(() => {
        console.log(123);
      }, 2000);

      for (var i = 0, str = ''; i < 900000; i++) {
        str += i; // 使用字符串拼接运算延迟运行时间
      }
      console.log(3); // 输出结果为：1 3 2
    </script>
  </body>
</html>
