<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    console.log(Math.PI * 6 * 6)			         // 输出结果为：113.09733552923255
    console.log(Math.abs(-13))				         // 输出结果为：13
    console.log(Math.max(12,9,21,36,15));	     // 输出结果为：36
    console.log(Math.min(12,9,21,36,15));	     // 输出结果为：9

    var a = Math.pow(3, 4);
    console.log(a);								            // 输出结果为：81
    console.log(Math.sqrt(a));					      // 输出结果为：9
   
    console.log(Math.ceil(3.1));              // 输出结果为：4
    console.log(Math.ceil(3.9));              // 输出结果为：4
    console.log(Math.floor(3.1));             // 输出结果为：3
    console.log(Math.floor(3.9));             // 输出结果为：3

    console.log(Math.round(2.1));             // 输出结果为：2
    console.log(Math.round(2.5));             // 输出结果为：3
    console.log(Math.round(2.9));             // 输出结果为：3
    console.log(Math.round(-2.5));            // 输出结果为：-2
    console.log(Math.round(-2.6));            // 输出结果为：-3

    console.log(Math.random());               // 输出结果为：(随机) 0.44156518524455257
  </script>
</body>
</html>
