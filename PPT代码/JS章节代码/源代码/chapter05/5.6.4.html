<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Document</title>
  </head>
  <body>
    <script>
    // 反转数组
    var arr = ['苹果', '香蕉', '芒果', '雪梨'];
    arr.reverse();
    console.log(arr);      // 输出结果为：(4) ['雪梨', '芒果', '香蕉', '苹果']
    // 升序排序
    var arr01 = [3, 13, 23, 33, 43]
    arr01.sort(function (a, b) {
      return a - b;
    });
    console.log(arr01);    // 输出结果为：(5) [3, 13, 23, 33, 43]
    // 降序排序
    arr01.sort(function (a, b) {
      return b - a;
    });
    console.log(arr01);    // 输出结果为：(5) [43, 33, 23, 13, 3]
    </script>
  </body>
</html>
