<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    // 准备一个待遍历的学生对象student
    var student = { 
      name: '小智',
      sex: '男',
      age: 20
    };
    // 遍历学生对象student
    for (var a in student) {
      console.log(a);
      console.log(student[a]);
    }

    var obj = { name: '小娜', sex: '女' };
    console.log('name' in obj);							// 输出结果为：true
    console.log('age' in obj);							// 输出结果为：false
  </script>
</body>
</html>
