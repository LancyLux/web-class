<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Document</title>
  </head>
  <body>
    <script>
    var str = 'Monday';   
    // 使用charAt()方法查找索引为3的字符 		 
    console.log(str.charAt(3));						        // 输出结果为：d
    // 使用charCodeAt()方法查找索引为3的字符的ASCII值
    console.log(str.charCodeAt(3));					      // 输出结果为：100   
    </script>
  </body>
</html>
