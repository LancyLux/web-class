<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    function Cat(name) {
      // 添加实例成员
      this.name = name;
      this.say = function () {
        console.log('喵喵喵');
      };
    }
    // 添加静态成员
    Cat.type = '小猫';
    Cat.run = function () {
      console.log('抓老鼠');
    };
    // 使用静态成员
    console.log(Cat.type);                // 输出结果为：小猫
    Cat.run();                            // 输出结果为：抓老鼠
    // 使用实例成员
    var cat1 = new Cat('小花');
    console.log(cat1.name);               // 输出结果为：小花
    cat1.say();                           // 输出结果为：喵喵喵
  </script>
</body>
</html>
