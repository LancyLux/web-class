<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    // 1.省略参数
    var date01 = new Date();
    console.log(date01);
    // 输出结果为：（当前时间）  Fri Mar 10 2023 09:36:37 GMT+0800 (中国标准时间)

    // 2.传入数字型参数
    var date02 = new Date(2023, 12 - 1, 13, 9, 35, 40);
    console.log(date02);
    // 输出结果为：Wed Dec 13 2023 09:35:40 GMT+0800 (中国标准时间)

    // 3.传入字符串型参数
    var date03 = new Date('2023-12-13 15:05:33');
    console.log(date03);
    // 输出结果为：Wed Dec 13 2023 15:05:33 GMT+0800 (中国标准时间)

    var date = new Date();
    // 设置年、月、日
    date.setFullYear(2023);
    date.setMonth(8 - 1);
    date.setDate(1);
    // 获取年、月、日
    var year = date.getFullYear();
    var month = date.getMonth() + 1;
    var day = date.getDate();
    // 通过数组将星期值转换为字符串
    var week = ['星期日', '星期一', '星期二', '星期三' , '星期四', '星期五', '星期六'];
    console.log(`${year}年${month}月${day}日` + week[date.getDay()]);

    // 返回当前时间，格式为“时:分:秒”，用两位数字表示
    function getTime() {
      var time = new Date();
      var h = time.getHours();
      h = h < 10 ? '0' + h : h;
      var m = time.getMinutes();
      m = m < 10 ? '0' + m : m;
      var s = time.getSeconds();
      s = s < 10 ? '0' + s : s;
      return h + ':' + m + ':' + s;
    }
    console.log(getTime());		// 输出结果示例：14:45:23
  </script>
</body>
</html>
