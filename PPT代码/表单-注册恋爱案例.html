<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册恋爱案例</title>
</head>

<body>
  <h4>青春不常在，抓紧谈恋爱</h4>
  <table>
    <!-- 第一行  -->
    <tr>
      <td>性别：</td>
      <td>
        <!-- 单选 -->
        <!-- id绑定label，name是用来分组实现单选效果 -->
        <input type="radio" id="nan" name="sex" />
        <label for="nan">男</label>

        <input type="radio" id="nv" name="sex" />
        <label for="nv">女</label>
      </td>
    </tr>
    <!-- 第二行  -->
    <tr>
      <td>生日：</td>
      <td>
        <select name="" id="">
          <option value="">---请选择年份---</option>
          <option value="">2001</option>
          <option value="">2002</option>
          <option value="">2003</option>
        </select>
        <select name="" id="">
          <option value="">---请选择月份---</option>
          <option value="">1月</option>
          <option value="">2月</option>
          <option value="">3月</option>
        </select>
        <select name="" id="">
          <option value="">---请选择日---</option>
          <option value="">1号</option>
          <option value="">2号</option>
          <option value="">3号</option>
        </select>
      </td>
    </tr>
    <!-- 第三行 -->
    <tr>
      <td>所在地区：</td>
      <td>
        <input type="text" value="请输入地区名称" />
      </td>
    </tr>
    <!-- 第四行  -->
    <tr>
      <td>已婚状况：</td>
      <td>
        <!-- 单选 -->
        <input type="radio" id="yh" name="merry" />
        <label for="yh">已婚</label>
        <input type="radio" id="wh" name="merry" />
        <label for="wh">未婚</label>
        <input type="radio" id="lh" name="merry" />
        <label for="lh">离婚</label>
      </td>
    </tr>
    <!-- 第五行  -->
    <tr>
      <td>学历：</td>
      <td><input type="text" /></td>
    </tr>
    <!-- 第六行  -->
    <tr>
      <td>喜欢的类型：</td>
      <td>
        <input type="checkbox" />妩媚的 <input type="checkbox" />可爱的
        <input type="checkbox" />小鲜肉 <input type="checkbox" />老腊肉
        <input type="checkbox" />都喜欢
      </td>
    </tr>
    <!-- 第七行 -->
    <tr>
      <td>个人介绍：</td>
      <td>
        <textarea name="" id=""></textarea>
      </td>
    </tr>
    <!-- 第八行  -->
    <tr>
      <td></td>
      <td>
        <input type="button" value="免费注册" />
      </td>
    </tr>
    <!-- 第九行 -->
    <tr>
      <td></td>
      <td><input type="checkbox" />我同意注册条款和会员加入标准</td>
    </tr>
    <!-- 第十行 -->
    <tr>
      <td></td>
      <td><a href="#">我是会员，立即登录</a></td>
    </tr>
    <!-- 第十一行 -->
    <tr>
      <td></td>
      <td>
        <h4>我承诺</h4>
        <ul>
          <li>年满18岁、单身</li>
          <li>抱着严肃的态度</li>
          <li>真诚寻找另一半</li>
        </ul>
      </td>
    </tr>
  </table>
</body>

</html>
