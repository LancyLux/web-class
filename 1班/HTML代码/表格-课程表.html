<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>表格-课程表</title>
  </head>
  <body>
    <table border="1">
      <tr>
        <td>星期一</td>
        <td>星期二</td>
      </tr>
      <tr>
        <td>web前端</td>
        <td>后端开发</td>
      </tr>
    </table>

    <!-- 高级表格 -->
    <table border="1">
      <thead>
        <tr>
          <th>星期一</th>
          <th>星期二</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>web前端</td>
          <td>后端开发</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
