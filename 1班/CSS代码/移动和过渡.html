<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>移动和过渡</title>
  </head>
  <body>
    <button>鼠标放上来</button>
  </body>
</html>
<style>
  button {
    width: 200px;
    height: 50px;
    background: linear-gradient(to bottom right, pink, red);
    border-radius: 50px;
    text-align: center;
    line-height: 50px;
  }
  button:hover {
    transform: translateY(-5px);
    /* 过渡 */
    transition: all 0.5s ease;
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.9);
  }
</style>
