  <body>
    <h1>辣椒炒肉</h1>
    <h2>材料</h2>
    <ul>
      <li>肉150g</li>
      <li>青椒200g</li>
    </ul>
    <h2>步骤：</h2>
    <ol>
      <li>将肉切成小块，加入青椒，搅拌均匀。</li>
      <li>加入盐、味精、料酒，翻炒均匀。</li>
      <li>加入油，翻炒均匀。</li>
    </ol>
