<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>广告</div>
  </body>
</html>
<script>
  var div = document.getElementsByTagName('div')[0];
  var timer = setTimeout(function () {
    div.style.display = 'none';
  }, 3000);
  clearTimeout(timer);
  // 生成定时器-AI
</script>
