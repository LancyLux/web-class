<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>仿土豆网显示隐藏遮罩案例</title>
  </head>

  <body>
    <div class="tudou">
      <div class="mask"></div>
      <img src="./../images/tudou.jpg" alt="" />
    </div>
  </body>
</html>
<style>
  .tudou {
    /* 子绝父相 */
    position: relative;
    width: 444px;
    height: 320px;
    margin: 30px auto;
  }
  img {
    width: 100%;
    height: 100%;
  }
  .mask {
    /* 默认情况下，隐藏 */
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    background-image: url('./../images/arr.png');
    background-repeat: no-repeat;
    background-position: center center;
  }
  .tudou:hover .mask {
    display: block;
  }
</style>
