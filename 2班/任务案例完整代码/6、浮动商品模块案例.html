<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>手机促销浮动布局</title>
  </head>
  <body>
    <div class="promo-container">
      <div class="phone-card">
        <div class="phone-image"></div>
        <h3>Redmi Note 12 Pro+</h3>
        <div class="price-tag">￥1999</div>
        <div class="specs">2亿像素主摄 | 天玑1080</div>
        <div class="installment">6期免息 ¥333/期</div>
      </div>

      <div class="phone-card">
        <div class="phone-image"></div>
        <h3>Xiaomi 13 Lite</h3>
        <div class="price-tag">￥2999</div>
        <div class="specs">骁龙7 Gen1 | 120Hz AMOLED</div>
        <div class="installment">12期免息 ¥250/期</div>
      </div>

      <div class="phone-card">
        <div class="phone-image"></div>
        <h3>Redmi K60 Pro</h3>
        <div class="price-tag">￥3299</div>
        <div class="specs">骁龙8 Gen2 | 2K 高光屏</div>
        <div class="installment">24期免息 ¥137/期</div>
      </div>
    </div>
  </body>
</html>
<style>
  .promo-container {
    width: 1200px;
    padding: 30px;
    background-color: gray;
    margin: 0 auto;
    overflow: hidden;
  }
  .phone-card {
    position: relative;
    width: 28%;
    background-color: #fff;
    float: left;
    margin-right: 40px;
    border-radius: 14px;
    padding: 10px;
  }
  .phone-image {
    width: 100%;
    height: 155px;
    background-color: rgb(200, 198, 198);
    border-radius: 10px;
  }
  .price-tag {
    position: absolute;
    right: 10px;
    top: 185px;
    width: 87px;
    height: 36px;
    background-color: red;
    color: #fff;
    border-radius: 10px;
    text-align: center;
    line-height: 36px;
    font-weight: bold;
  }
  .specs {
    font-size: 14px;
    color: gray;
  }
  .installment {
    padding: 10px;
    background-color: #fff0eb;
    color: red;
    border-radius: 10px;
    margin: 10px 0;
  }
</style>
