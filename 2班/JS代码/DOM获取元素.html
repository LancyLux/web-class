<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <ul>
      <li id="111">11111</li>
      <li>222222</li>
      <li>333333</li>
      <li class="girl">444444</li>
      <li class="girl">555555</li>
      <li class="boy">666666</li>
      <li class="boy">777777</li>
    </ul>
  </body>
</html>
<script>
  // 1.通过id获取元素
  var li1 = document.getElementById('111');
  console.log(li1);

  // 2.通过标签名获取元素
  var lis = document.getElementsByTagName('li');
  console.log(lis);
  console.log(lis[0]);

  // 3.通过类名获取元素
  var girls = document.getElementsByClassName('girl');
  var boys = document.getElementsByClassName('boy');
  var firstgirl = document.getElementsByClassName('girl')[0];
  console.log(girls[0]);
</script>
