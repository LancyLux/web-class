<script>
  var username = prompt('请输入3-6位的用户名,不能包含admin特殊词');
  if (username.length < 3 || username.length > 6) {
    alert('用户名长度必须在3-6位之间');
  } else if (username.indexOf('admin') != -1) {
    alert('用户名不能包含admin特殊词');
  } else {
    alert('用户名校验通过');
  }
</script>
