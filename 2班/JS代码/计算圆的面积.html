<script>
  // JS代码
  var radius = prompt('请输入圆的半径:');
  var area = Math.PI * radius * radius;
  var zhouchang = 2 * Math.PI * radius;
  alert('圆的面积为：' + area + '\n圆的周长为：' + zhouchang);
  alert(`圆的面积为：${area}\n圆的周长为：${zhouchang}`);
</script>
