<!doctype html>
<html lang="en">

    <title>Document</title>
  </head>
  <body>
    <table border="1">
      <thead>
        <tr>

      <tbody>
        <tr>

    </table>
  </body>
</html>
<style>
  .pink {
    background-color: pink;
  }
</style>
<script>
  var tbody_tr = document.getElementsByTagName('tbody')[0].getElementsByTagName('tr');

  for (let i = 0; i < tbody_tr.length; i++) {
    tbody_tr[i].addEventListener('mouseover', function () {
      tbody_tr[i].classList.add('pink');
    });

    tbody_tr[i].addEventListener('mouseout', function () {
      tbody_tr[i].classList.remove('pink');
    });
  }
</script>
