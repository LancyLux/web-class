<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="box">
      <h1>留言板</h1>
      <ul class="liuyan"></ul>
      <textarea placeholder="请编辑您的留言"></textarea>
      <button class="sub">发布留言</button>
    </div>
  </body>
</html>
<script>
  // 获取元素
  var ul = document.getElementsByName('liuyan')[0];
  var inputText = document.getElementsByTagName('textarea')[0];
  var btn = document.getElementsByClassName('sub')[0];
  // 点击发布按钮
  btn.addEventListener('click', function () {
    if (inputText.value == '') {
      alert('您没有输入内容');
      return false;
    } else {
      // 创建li元素节点
      var li = document.createElement('li');
      li.innerHTML = inputText.value;
      // 删除留言按钮
      var delBtn = document.createElement('button');
      delBtn.innerHTML = '删除';

      li.appendChild(delBtn);
    }
  });
</script>
<style>
  .box {
    width: 500px;
    margin: 0 auto;
    border: 2px solid green;
    padding: 20px;
  }
  h1 {
    text-align: center;
    margin: 0;
  }
  .liuyan {
    width: 400px;
    min-height: 200px;
    margin: 20px auto;
    border: 2px dotted green;
  }
  textarea {
    display: block;
    width: 300px;
    height: 100px;
    margin: 0 auto;
  }
  .sub {
    display: block;
    width: 300px;
    margin: 0 auto;
    background-color: rgb(184, 237, 184);
    margin-top: 20px;
  }
</style>
