<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS基础语法</title>
    <link rel="stylesheet" href="./css/样式.css" />
  </head>
  <body>
    <p>这是第1个p标签</p>
    <p id="p2">这是第2个p标签</p>
    <div class="div1">
      这是div元素
      <span>这是div里面的span</span>
    </div>
  </body>
</html>

<style>
  /* 标签选择器 */
  p {
    color: blue;
  }
  /* id选择器 */
  #p2 {
    color: red;
  }
  /* 类选择器 */
  .div1 {
    color: green;
  }
  /* 后代选择器 */
  .div1 span {
    color: yellow;
  }
</style>
