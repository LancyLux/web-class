<!doctype html>
<html>
  <head>
    <title>皮卡丘训练师卡</title>
    <style>
      /* 被破坏的初始样式 */
      .card {
        width: 600px;
        border: black;
      }

      .badge {
        background: yellow;
      }

      img {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="header">
        <h2>⚡ 雷电训练师</h2>
        <span class="badge">初级徽章</span>
      </div>

      <img src="./../images/pikachu.jpg" alt="皮卡丘" />

      <div class="stats">
        <p>等级：Lv.15</p>
        <p>技能：电光一闪</p>
      </div>
    </div>
  </body>
</html>
<style>
  .card {
    background: linear-gradient(white 60%, orange);
    width: 370px;
    height: 680px;
    /* background-color: yellow; */
    border: 8px solid yellow;
    border-radius: 35px;
    margin: 30px auto;
    /* 设置内边距：上下0，左右20px */
    padding: 0 20px;
    /* 盒子阴影 */
    box-shadow: 0 0 35px rgba(0, 0, 0, 0.5);
  }
  .header h2 {
    margin-bottom: 5px;
  }
  .badge {
    display: inline-block;
    background: yellow;
    border: 3px solid orange;
    padding: 6px 21px;
    border-radius: 10px;
  }
  img {
    width: 100%;
    height: 343px;
    object-fit: cover;
    border: 2px solid gray;
    border-radius: 10px;
    margin: 20px 0;
  }
  .stats p {
    padding: 11px 16px;
    background-color: gainsboro;
    border-radius: 10px;
  }
</style>
