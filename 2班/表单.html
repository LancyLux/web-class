<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>表单</title>
  </head>
  <body>
    <form action="">
      <input type="text" />
      <input type="password" /><br />
      <!-- 单选框 -->
      <input type="radio" />男 <br />
      <input type="radio" />女<br />
      <!-- 多选框 -->
      <input type="checkbox" />游泳 <input type="checkbox" />篮球 <input type="checkbox" />足球

      <!-- 下拉选择框 -->
      <select>
        <option>选项1</option>
        <option>选项2</option>
        <option>选项3</option></select
      ><br />
      <!-- 按钮 -->
      <input type="submit" value="提交" />
      <button>按钮</button>
    </form>
  </body>
</html>
