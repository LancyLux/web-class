<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h4>青春不常在，抓紧谈恋爱</h4>
    <table>
      <!-- 第一行 -->
      <tr>
        <td>性别：</td>
        <td>
          <input type="radio" id="nan" name="sex" />
          <label for="nan">男</label>
          <input type="radio" id="nv" name="sex" />
          <label for="nv">女</label>
        </td>
      </tr>
      <!-- 第二行 -->
      <tr>
        <td>生日：</td>
        <td>
          <select name="" id="">
            <option value="">--请选择年份--</option>
            <option value="">2001</option>
            <option value="">2002</option>
          </select>
          <select name="" id="">
            <option value="">--请选择月份--</option>
            <option value="">1月</option>
            <option value="">2月</option>
          </select>
          <select name="" id="">
            <option value="">--请选择日期--</option>
            <option value="">1号</option>
            <option value="">2号</option>
          </select>
        </td>
      </tr>
      <!-- 第三行 -->
      <tr>
        <td>地区：</td>
        <td>
          <input type="text" placeholder="请输入地区名称" />
        </td>
      </tr>
      <!-- 第四行 -->
      <tr>
        <td>已婚状况：</td>
        <td>
          <input type="radio" name="marry" id="married" />
          <label for="married">已婚</label>
          <input type="radio" name="marry" id="unmarried" />
          <label for="unmarried">未婚</label>
          <input type="radio" name="marry" id="divorced" />
          <label for="divorced">离婚</label>
        </td>
      </tr>

      <tr>
        <td>学历：</td>
        <td>
          <input type="text" />
        </td>
      </tr>

      <tr>
        <td>喜欢的类型：</td>
        <td>
          <input type="checkbox" />妩媚的 <input type="checkbox" />妩媚的
          <input type="checkbox" />妩媚的 <input type="checkbox" />妩媚的
          <input type="checkbox" />妩媚的
        </td>
      </tr>

      <tr>
        <td>个人介绍：</td>
        <td>
          <textarea></textarea>
        </td>
      </tr>

      <tr>
        <td></td>
        <td>
          <button>免费注册</button>
        </td>
      </tr>

      <tr>
        <td></td>
        <td>
          <a href="#">我是会员，立即登录</a>
        </td>
      </tr>

      <tr>
        <td></td>
        <td>
          <ul>
            <li>年满18岁、单身</li>
            <li>抱着严肃的态度</li>
            <li>真诚寻找另一半</li>
          </ul>
        </td>
      </tr>
    </table>

</html>
